services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - certbot
    restart: unless-stopped

  frontend:
    build: ./mywebsite/frontend
    expose:
      - "8000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./mywebsite/backend
    env_file:
      - ./mywebsite/backend/.env
    expose:
      - "8008"
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  ddns-updater:
    image: qmcgaw/ddns-updater
    volumes:
      - ./ddns-updater/data:/updater/data
    ports:
      - "127.0.0.1:9000:9000"
    restart: unless-stopped

volumes:
  certbot_certs:
  certbot_www: